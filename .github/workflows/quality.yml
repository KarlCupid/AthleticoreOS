name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - fix/schedule-service-corruption
  workflow_dispatch:
    inputs:
      run_live_workout_db_checks:
        description: Run workout-programming live DB/RLS smoke tests after quality passes.
        required: false
        default: false
        type: boolean
      allow_remote_workout_db_test_project:
        description: Allow a dedicated non-production remote Supabase test project.
        required: false
        default: false
        type: boolean

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run deterministic preview quality gate
        env:
          PREVIEW_QUALITY_ARTIFACT_DIR: ${{ runner.temp }}/preview-quality-gate
          PREVIEW_READINESS_REPORT: ${{ runner.temp }}/preview-quality-gate/docs/release/preview-readiness.md
        run: node scripts/run-preview-quality-gate.js

      - name: Upload preview readiness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-readiness-${{ github.sha }}
          path: ${{ runner.temp }}/preview-quality-gate
          if-no-files-found: error

  workout-programming-live-db:
    name: Workout programming live DB/RLS smoke
    needs: quality
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_workout_db_checks == 'true'
    runs-on: ubuntu-latest
    environment: workout-programming-live-db-test
    env:
      SUPABASE_URL: ${{ secrets.WORKOUT_TEST_SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.WORKOUT_TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.WORKOUT_TEST_SUPABASE_SERVICE_ROLE_KEY }}
      WORKOUT_DB_TESTS: '1'
      WORKOUT_RLS_TESTS: '1'
      WORKOUT_DB_ALLOW_REMOTE: ${{ github.event.inputs.allow_remote_workout_db_test_project == 'true' && '1' || '0' }}
      WORKOUT_RLS_ALLOW_REMOTE: ${{ github.event.inputs.allow_remote_workout_db_test_project == 'true' && '1' || '0' }}
      WORKOUT_SUPABASE_NON_PRODUCTION: ${{ github.event.inputs.allow_remote_workout_db_test_project == 'true' && '1' || '0' }}
      WORKOUT_SUPABASE_TARGET_LABEL: workout-programming-live-db-test
      WORKOUT_PRODUCTION_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
      WORKOUT_PRODUCTION_SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run deterministic preview quality gate with live DB/RLS
        env:
          PREVIEW_QUALITY_ARTIFACT_DIR: ${{ runner.temp }}/preview-quality-gate-live-workout-db
          PREVIEW_READINESS_REPORT: ${{ runner.temp }}/preview-quality-gate-live-workout-db/docs/release/preview-readiness.md
        run: node scripts/run-preview-quality-gate.js --include-workout-live

      - name: Upload live DB/RLS readiness artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-readiness-live-workout-db-${{ github.sha }}
          path: ${{ runner.temp }}/preview-quality-gate-live-workout-db
          if-no-files-found: error
